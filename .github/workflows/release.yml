name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run vet
        run: go vet ./...

      - name: Build release binaries
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-s -w" -trimpath -o dist/skill-inspector-darwin-amd64  .
          GOOS=darwin  GOARCH=arm64 go build -ldflags "-s -w" -trimpath -o dist/skill-inspector-darwin-arm64  .
          GOOS=linux   GOARCH=amd64 go build -ldflags "-s -w" -trimpath -o dist/skill-inspector-linux-amd64   .
          GOOS=linux   GOARCH=arm64 go build -ldflags "-s -w" -trimpath -o dist/skill-inspector-linux-arm64   .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
